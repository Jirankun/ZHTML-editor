<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error - Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Fira Code', monospace;
    }

    body {
      background: #1e1f29;
      color: #f8f8f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .error-card {
      background: #282a36;
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      border: 1px solid #44475a;
    }

    .icon-error {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      fill: #ff5555;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 16px;
      color: #ff6e6e;
    }

    p {
      font-size: 15px;      line-height: 1.6;
      color: #f8f8f2;
      margin-bottom: 24px;
    }

    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #2d3748;
      color: #4ade80;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      transition: background 0.2s, transform 0.1s;
      border: 1px solid #44475a;
    }

    .btn-whatsapp:hover {
      background: #3a4558;
      transform: translateY(-2px);
    }

    .btn-whatsapp:active {
      transform: translateY(0);
    }

    .icon-whatsapp {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
  </style>
</head>
<body>
