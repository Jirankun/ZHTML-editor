<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎬 Video List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #eee;
      height: 100%;
      overflow: hidden;
    }

    .fake-header {
      padding: 50px 20px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .fake-header .logo {
      width: 32px; height: 32px;
      background: #333;
      border-radius: 8px;
      animation: pulse 1.5s infinite ease-in-out;
    }
    .fake-header .title {
      height: 20px;
      background: #222;
      border-radius: 4px;
      width: 120px;
      animation: pulse 1.5s infinite ease-in-out 0.2s;
    }

    .skeleton-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }
    .skeleton-item {
      display: flex; gap: 14px; padding: 12px;
      background: #111; border-radius: 12px; border: 1px solid #1a1a1a;    }
    .skeleton-thumb {
      width: 120px; height: 68px;
      background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
      background-size: 200% 100%; border-radius: 8px;
      animation: shimmer 1.4s infinite linear; flex-shrink: 0;
    }
    .skeleton-info { flex: 1; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
    .skeleton-title {
      height: 16px;
      background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
      background-size: 200% 100%; border-radius: 4px;
      animation: shimmer 1.4s infinite linear 0.1s; width: 90%;
    }
    .skeleton-meta { display: flex; gap: 8px; }
    .skeleton-meta span { height: 12px; background: #1a1a1a; border-radius: 3px; width: 50px; }

    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* === LOADING SCREEN === */
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
      display: none; justify-content: center; align-items: center;
      z-index: 99999; flex-direction: column; overflow: hidden;
    }
    #loading-screen.active { display: flex; }

    .loading-bg { position: absolute; width: 100%; height: 100%; overflow: hidden; }
    .particle {
      position: absolute; width: 4px; height: 4px;
      background: rgba(231, 76, 60, 0.6); border-radius: 50%;
      animation: particleFloat 8s infinite ease-in-out;
      box-shadow: 0 0 10px rgba(231, 76, 60, 0.8);
    }
    .particle:nth-child(1) { left: 20%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 40%; animation-delay: 1.5s; }
    .particle:nth-child(3) { left: 60%; animation-delay: 3s; }
    .particle:nth-child(4) { left: 80%; animation-delay: 4.5s; }
    .particle:nth-child(5) { left: 30%; animation-delay: 2s; }
    @keyframes particleFloat {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; } 90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    .loading-container {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 40px;    }

    .loading-box-wrapper { width: 120px; height: 120px; perspective: 1000px; }
    .loading-box {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d; animation: box3DRotate 3s ease-in-out infinite;
    }
    .box-face {
      position: absolute; width: 120px; height: 120px;
      background: linear-gradient(135deg, rgba(231, 76, 60, 0.9), rgba(192, 57, 43, 0.9));
      border: 3px solid #e74c3c; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 40px rgba(231, 76, 60, 0.6), inset 0 0 20px rgba(255,255,255,0.1);
    }
    .box-face:nth-child(1) { transform: rotateY(0deg) translateZ(60px); }
    .box-face:nth-child(2) { transform: rotateY(90deg) translateZ(60px); }
    .box-face:nth-child(3) { transform: rotateY(180deg) translateZ(60px); }
    .box-face:nth-child(4) { transform: rotateY(-90deg) translateZ(60px); }
    .box-face:nth-child(5) { transform: rotateX(90deg) translateZ(60px); }
    .box-face:nth-child(6) { transform: rotateX(-90deg) translateZ(60px); }
    @keyframes box3DRotate {
      0%, 30% { transform: rotateX(0deg) rotateY(0deg); }
      50%, 70% { transform: rotateX(180deg) rotateY(180deg); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }

    .water-drops-container {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); width: 200px; height: 200px;
      pointer-events: none;
    }
    .water-drop {
      position: absolute; width: 20px; height: 20px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
      opacity: 0; animation: dropFallBetter 4s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(52, 152, 219, 0.8), 0 0 40px rgba(52, 152, 219, 0.4);
    }
    .water-drop:nth-child(1) { left: 50%; top: 50%; animation-delay: 0s; }
    .water-drop:nth-child(2) { left: 60%; top: 40%; animation-delay: 0.7s; }
    .water-drop:nth-child(3) { left: 40%; top: 60%; animation-delay: 1.4s; }
    .water-drop:nth-child(4) { left: 55%; top: 55%; animation-delay: 2.1s; }
    @keyframes dropFallBetter {
      0%, 35% { opacity: 0; transform: rotate(-45deg) translateY(0) scale(1); }
      40% { opacity: 0.9; transform: rotate(-45deg) translateY(0) scale(1); }
      45% { opacity: 0.8; transform: rotate(-45deg) translateY(80px) scale(0.6); }
      50%, 100% { opacity: 0; transform: rotate(-45deg) translateY(100px) scale(0.3); }
    }
    .progress-container { width: 280px; max-width: 90vw; }
    .progress-bar-bg {
      width: 100%; height: 8px; background: rgba(255,255,255,0.1);
      border-radius: 10px; overflow: hidden; position: relative;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #e74c3c, #c0392b, #e74c3c);
      background-size: 200% 100%; border-radius: 10px;
      animation: progressFill 3s ease-out infinite, progressShimmer 2s linear infinite;
      box-shadow: 0 0 20px rgba(231, 76, 60, 0.6); position: relative; overflow: hidden;
    }
    .progress-bar-fill::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: progressSweep 1.5s ease-in-out infinite;
    }
    @keyframes progressFill {
      0% { width: 0%; } 30% { width: 45%; } 40% { width: 47%; }
      50% { width: 48%; } 60% { width: 49%; } 70% { width: 50%; }
      80% { width: 52%; } 90% { width: 55%; } 100% { width: 100%; }
    }
    @keyframes progressShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes progressSweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    .loading-text-container { text-align: center; }
    .loading-text {
      font-size: 1.6rem; font-weight: 700; color: #e74c3c;
      text-transform: uppercase; letter-spacing: 4px;
      animation: textGlitchBetter 0.3s infinite, textPulseBetter 4s ease-in-out infinite;
      text-shadow: 0 0 20px rgba(231, 76, 60, 0.8), 0 0 40px rgba(231, 76, 60, 0.4);
      margin-bottom: 10px;
    }
    @keyframes textGlitchBetter {
      0%, 85%, 100% { transform: translate(0); opacity: 1; filter: blur(0); }
      87% { transform: translate(-2px, 2px); opacity: 0.8; filter: blur(1px); }
      89% { transform: translate(2px, -2px); opacity: 0.6; filter: blur(0.5px); }
      91% { transform: translate(-2px, -2px); opacity: 0.4; filter: blur(1px); }
      93% { transform: translate(2px, 2px); opacity: 0.8; filter: blur(0); }
    }
    @keyframes textPulseBetter { 0%, 35%, 50%, 100% { opacity: 1; } 40%, 45% { opacity: 0.4; } }

    .loading-percentage {
      font-size: 2rem; font-weight: 900; color: #fff;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 20px rgba(231, 76, 60, 0.8);
      animation: percentagePulse 2s ease-in-out infinite;
    }
    @keyframes percentagePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .loading-status {
      font-size: 0.9rem; color: #888; margin-top: 15px;
      font-style: italic; animation: statusBlink 2s ease-in-out infinite;
      text-align: center; max-width: 300px;
    }
    @keyframes statusBlink { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    .loading-stuck-indicator {
      position: absolute; bottom: 80px; font-size: 0.85rem; color: #666;
      animation: stuckIndicatorPulse 3s ease-in-out infinite;
      display: flex; align-items: center; gap: 10px;
    }
    .loading-stuck-indicator::before {
      content: '⚠️'; font-size: 1.2rem; animation: warningBounce 1s ease-in-out infinite;
    }
    @keyframes stuckIndicatorPulse {
      0%, 60%, 100% { opacity: 0; transform: translateY(10px); }
      70%, 90% { opacity: 1; transform: translateY(0); }
    }
    @keyframes warningBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    .buffering-dots { display: flex; gap: 8px; margin-top: 20px; justify-content: center; }
    .buffering-dot {
      width: 10px; height: 10px; background: #e74c3c; border-radius: 50%;
      animation: bufferingDot 1.4s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(231, 76, 60, 0.6);
    }
    .buffering-dot:nth-child(1) { animation-delay: 0s; }
    .buffering-dot:nth-child(2) { animation-delay: 0.2s; }
    .buffering-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bufferingDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    #content-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
      z-index: 9998; pointer-events: none; opacity: 0;
      transition: opacity 0.3s ease;
    }
    #content-overlay.active { pointer-events: all; opacity: 1; }

    /* === PRANK / VIDEO OVERLAY (FIXED FULLSCREEN) === */
    #prank-overlay {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000; display: none;
      justify-content: center; align-items: center;
      z-index: 100000; overflow: hidden;    }
    #prank-overlay.force-fullscreen {
      position: fixed !important; inset: 0 !important;
      width: 100vw !important; height: 100vh !important;
      z-index: 999999 !important;
    }

    #video-container {
      width: 100%; height: 100%;
      max-width: 100%; aspect-ratio: auto;
      background: #000; border-radius: 0; border: none; box-shadow: none;
      overflow: hidden; position: relative;
    }
    #prank-video {
      width: 100vw; height: 100vh;
      object-fit: contain; display: block;
      background: #000;
    }

    #prank-overlay.horror-mode {
      background: #000; animation: horrorFlash 0.07s infinite alternate;
    }
    @keyframes horrorFlash {
      from { background: #200; filter: contrast(1.1) brightness(0.95); }
      to { background: #700; filter: contrast(1.9) brightness(1.4) saturate(2.2); box-shadow: inset 0 0 120px #f00; }
    }
    .horror-text {
      position: absolute; font-size: clamp(1.5rem, 6vw, 3.5rem);
      font-weight: 900; color: #fff;
      text-shadow: 0 0 10px #f00, 0 0 20px #f00, 0 0 40px #f00, 2px 2px 0 #000, -2px -2px 0 #000;
      animation: horrorShake 0.08s infinite; pointer-events: none; z-index: 100001;
      text-align: center; padding: 20px; max-width: 90%;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    @keyframes horrorShake {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
      25% { transform: translate(calc(-50% + 3px), calc(-50% - 2px)) rotate(-0.8deg); }
      50% { transform: translate(calc(-50% - 2px), calc(-50% + 3px)) rotate(0.8deg); }
      75% { transform: translate(calc(-50% + 2px), calc(-50% + 2px)) rotate(-0.4deg); }
    }

    #cookie-consent {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      border-top: 3px solid #e74c3c; padding: 18px 20px;
      display: none; flex-direction: column; gap: 14px;
      z-index: 10002; box-shadow: 0 -6px 24px rgba(0,0,0,0.6);
      animation: slideUp 0.4s ease-out; width: 100%;
    }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }    #cookie-consent p { font-size: 0.95rem; line-height: 1.5; color: #ccc; margin: 0; }
    #cookie-consent p strong { color: #e74c3c; font-weight: 700; }
    #cookie-consent .btn-group { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; }
    #cookie-consent button {
      padding: 11px 24px; font-size: 0.95rem; border: none;
      border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: all 0.2s; min-width: 140px;
    }
    #accept-cookie { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; box-shadow: 0 4px 14px rgba(46,204,113,0.35); }
    #accept-cookie:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46,204,113,0.55); }
    #decline-cookie { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; box-shadow: 0 4px 14px rgba(231,76,60,0.35); }
    #decline-cookie:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(231,76,60,0.55); }

    @media (max-width: 768px) {
      .fake-header { padding: 45px 16px 14px; }
      .skeleton-list { padding: 10px; gap: 14px; }
      .skeleton-item { padding: 10px; gap: 12px; flex-direction: column; }
      .skeleton-thumb { width: 100%; height: 180px; }
      .skeleton-title { width: 95%; }
      #cookie-consent { padding: 16px 18px; border-top-width: 2px; }
      #cookie-consent p { font-size: 0.9rem; }
      #cookie-consent button { padding: 10px 18px; font-size: 0.9rem; min-width: 120px; }
      .loading-box-wrapper { width: 100px; height: 100px; }
      .box-face { width: 100px; height: 100px; }
      .loading-text { font-size: 1.3rem; }
      .loading-percentage { font-size: 1.6rem; }
      .progress-container { width: 240px; }
    }
    .hidden { display: none !important; }
  </style>
</head>

    <div class="skeleton-item"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-title"></div><div class="skeleton-meta"><span></span><span></span><span></span></div></div></div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">    <div class="loading-bg">
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div>
    </div>
    <div class="loading-container">
      <div class="loading-box-wrapper">
        <div class="loading-box">
          <div class="box-face"></div><div class="box-face">📹</div><div class="box-face">🎥</div>

      </div>

  <script>
    const prankOverlay = document.getElementById('prank-overlay');
    const prankVideo = document.getElementById('prank-video');
    const horrorMsg = document.getElementById('horror-msg');
    const cookieConsent = document.getElementById('cookie-consent');
    const contentOverlay = document.getElementById('content-overlay');
    const loadingScreen = document.getElementById('loading-screen');
    const progressFill = document.getElementById('progress-fill');
    const loadingPercentage = document.getElementById('loading-percentage');
    const loadingStatus = document.getElementById('loading-status');
    const loadingMainText = document.getElementById('loading-main-text');
    const acceptBtn = document.getElementById('accept-cookie');
    const declineBtn = document.getElementById('decline-cookie');

    let prankActive = false;
    let horrorMode = false;
    let urlInterval = null;

    const fakeUrls = [
      '/watch?v=dQw4w9WgXcQ', '/secure/auth?token=xyz', '/error/404?msg=TERJEBAK',
      '/live?stream=horror_666', '/system/critical?alert=RED', '/you/cant/escape',
      '/👁️/watching/you', '/redirect?to=nightmare', '/loading...please/wait',
      '/⚠️/warning/malicious', '/dont-look-back', '/im-watching-you',
      '/room-666', '/ghost-detected', '/help-me'
    ];

    const loadingStatuses = [
      'Menghubungkan ke server...', 'Mempersiapkan video...', 'Buffering 25%...',
      'Buffering 50%...', 'Memproses codec...', 'Mendecrypt stream...',
      'Mengoptimalkan kualitas...', 'Hampir selesai...', 'Finalizing...'
    ];

    function changeRealUrl(path) {
      try { window.history.pushState(null, '', window.location.origin + path); } catch(e) {}
    }

    function simulateLoading() {
      let progress = 0;
      let percentage = 0;
      let statusIndex = 0;
      
      const fastInterval = setInterval(() => {
        progress += 1.5;
        percentage = Math.floor(progress);
        
        if (progress >= 45) {
          clearInterval(fastInterval);
          progress = 45;
          loadingMainText.textContent = 'Buffering...';          loadingMainText.style.animation = 'textGlitchBetter 0.2s infinite';
          
          const stuckInterval = setInterval(() => {
            progress += 0.2;
            percentage = Math.floor(progress);
            loadingPercentage.textContent = percentage + '%';
            
            if (progress >= 55) {
              clearInterval(stuckInterval);
              loadingMainText.textContent = 'Memuat Video';
              loadingMainText.style.animation = 'textGlitchBetter 0.3s infinite, textPulseBetter 4s ease-in-out infinite';
              
              const finalInterval = setInterval(() => {
                progress += 2;
                percentage = Math.floor(progress);
                if (percentage >= 100) {
                  progress = 100; percentage = 100;
                  clearInterval(finalInterval);
                  setTimeout(showVideoContent, 500);
                }
                loadingPercentage.textContent = percentage + '%';
                progressFill.style.width = progress + '%';
                if (percentage % 10 === 0 && statusIndex < loadingStatuses.length) {
                  loadingStatus.textContent = loadingStatuses[statusIndex];
                  statusIndex++;
                }
              }, 100);
            }
          }, 100);
        }
        loadingPercentage.textContent = percentage + '%';
        progressFill.style.width = progress + '%';
        if (percentage % 10 === 0 && statusIndex < loadingStatuses.length) {
          loadingStatus.textContent = loadingStatuses[statusIndex];
          statusIndex++;
        }
      }, 100);
    }

    function startRealUrlChanger() {
      changeRealUrl(fakeUrls[Math.floor(Math.random() * fakeUrls.length)]);
      urlInterval = setInterval(() => {
        changeRealUrl(fakeUrls[Math.floor(Math.random() * fakeUrls.length)]);
      }, 200 + Math.random() * 300);
    }

    function startHorrorMode() {
      if (prankActive) return;
      prankActive = true; horrorMode = true;
      cookieConsent.style.display = 'none';      contentOverlay.style.display = 'none';
      loadingScreen.classList.remove('active');
      prankOverlay.classList.add('horror-mode', 'force-fullscreen');
      prankOverlay.style.display = 'flex';
      horrorMsg.classList.remove('hidden');
      startRealUrlChanger();
      let flashCount = 0;
      const flashInterval = setInterval(() => {
        document.body.style.background = flashCount % 2 === 0 ? '#400' : '#000';
        flashCount++;
        if (flashCount > 10) { clearInterval(flashInterval); document.body.style.background = '#300'; }
      }, 80);
      setTimeout(attemptCloseTab, 2200);
    }

    async function startVideoPrank() {
      if (prankActive) return;
      prankActive = true;

      // ✅ FULLSCREEN REQUEST LANGSUNG PAS KLIK (USER GESTURE)
      try {
        if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
        else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
        else if (document.documentElement.msRequestFullscreen) document.documentElement.msRequestFullscreen();
      } catch(e) { console.log('FS blocked, using CSS fallback'); }

      // ✅ FORCE CSS FULLSCREEN FALLBACK
      prankOverlay.classList.add('force-fullscreen');
      prankOverlay.style.display = 'flex';
      document.body.style.overflow = 'hidden';

      loadingScreen.classList.add('active');
      cookieConsent.style.display = 'none';
      contentOverlay.style.display = 'none';

      setTimeout(() => changeRealUrl('/loading/video'), 1500);
      simulateLoading();
    }

    async function showVideoContent() {
      loadingScreen.classList.remove('active');
      prankVideo.style.width = '100vw';
      prankVideo.style.height = '100vh';
      prankVideo.style.objectFit = 'contain';
      
      prankVideo.muted = false;
      prankVideo.currentTime = 0;
      
      const playPromise = prankVideo.play();
      if (playPromise !== undefined) {        playPromise.catch(() => { prankVideo.muted = true; prankVideo.play(); });
      }
      prankVideo.addEventListener('ended', startUrlChaosAndClose, { once: true });
    }

    function startUrlChaosAndClose() {
      let chaosCount = 0;
      const chaosInterval = setInterval(() => {
        changeRealUrl(fakeUrls[Math.floor(Math.random() * fakeUrls.length)]);
        chaosCount++;
        if (chaosCount >= 8) { clearInterval(chaosInterval); attemptCloseTab(); }
      }, 150);
    }

    function attemptCloseTab() {
      window.close();
      try { const win = window.open('', '_self'); if (win) win.close(); } catch(e) {}
      try { window.location.replace('about:blank'); } catch(e) {}
      setTimeout(() => {
        if (document.body) {
          document.documentElement.innerHTML = `
            <body style="background:#000;color:#f00;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;font-size:1.1rem;text-align:center;padding:20px;overflow:hidden;">
              <div>
                <div style="font-size:4rem;margin-bottom:15px;">☠️</div>
                <div style="font-weight:bold;font-size:1.3rem;">TERLALU LAMBAT BRE...</div>
                <div style="font-size:0.95rem;color:#999;margin-top:20px;line-height:1.6;">
                  Tab ini udah gak bisa diselamatkan.<br><span style="color:#f66;">Tutup manual aja 😈</span>
                </div>
              </div>
            </body>`;
        }
      }, 800);
    }

    acceptBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); startVideoPrank(); return false; });
    declineBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); startHorrorMode(); return false; });

    prankVideo.addEventListener('play', (e) => {
      if (!prankActive) { e.preventDefault(); prankVideo.pause(); prankVideo.currentTime = 0; }
    });
    document.addEventListener('contextmenu', (e) => { if (prankActive) e.preventDefault(); });
    document.addEventListener('keydown', (e) => {
      if (prankActive && ['Escape','F11','F12','Ctrl','Meta','Alt'].includes(e.key)) e.preventDefault();
    });
    window.addEventListener('popstate', (e) => {
      if (prankActive) { e.preventDefault(); window.history.pushState(null, '', window.location.href); }
    });

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {        cookieConsent.style.display = 'flex';
        contentOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }, 800);
    });
  </script>
</body>
</html>
