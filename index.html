<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎬 Video List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #eee;
      height: 100%;
      overflow: hidden;
    }

    .fake-header {
      padding: 50px 20px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .fake-header .logo {
      width: 32px; height: 32px;
      background: #333;
      border-radius: 8px;
      animation: pulse 1.5s infinite ease-in-out;
    }
    .fake-header .title {
      height: 20px;
      background: #222;
      border-radius: 4px;
      width: 120px;
      animation: pulse 1.5s infinite ease-in-out 0.2s;
    }

    .skeleton-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }
    .skeleton-item {
      display: flex;
      gap: 14px;      padding: 12px;
      background: #111;
      border-radius: 12px;
      border: 1px solid #1a1a1a;
    }
    .skeleton-thumb {
      width: 120px; height: 68px;
      background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      border-radius: 8px;
      animation: shimmer 1.4s infinite linear;
      flex-shrink: 0;
    }
    .skeleton-info { flex: 1; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
    .skeleton-title {
      height: 16px;
      background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: shimmer 1.4s infinite linear 0.1s;
      width: 90%;
    }
    .skeleton-meta { display: flex; gap: 8px; }
    .skeleton-meta span { height: 12px; background: #1a1a1a; border-radius: 3px; width: 50px; }

    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* LOADING SCREEN */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      flex-direction: column;
    }
    #loading-screen.active { display: flex; }

    .loading-box {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 3px solid #e74c3c;
      border-radius: 16px;
      position: relative;
      animation: boxSpin 2s ease-in-out infinite, boxDrop 4s ease-in-out infinite;      box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
    }
    
    @keyframes boxSpin {
      0%, 35% { transform: rotate(0deg); }
      45%, 85% { transform: rotate(360deg); }
      100% { transform: rotate(720deg); }
    }
    
    @keyframes boxDrop {
      0%, 30% { transform: translateY(0) rotate(0deg); box-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }
      40% { transform: translateY(80px) rotate(180deg); box-shadow: 0 30px 80px rgba(231, 76, 60, 0.9); }
      50%, 90% { transform: translateY(0) rotate(360deg); box-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }
      100% { transform: translateY(0) rotate(720deg); box-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }
    }

    .water-drop {
      position: absolute;
      width: 16px; height: 16px;
      background: #e74c3c;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      opacity: 0;
      animation: dropFall 4s ease-in-out infinite;
      box-shadow: 0 0 15px #e74c3c;
    }
    .water-drop:nth-child(1) { top: 50%; left: 50%; animation-delay: 0s; }
    .water-drop:nth-child(2) { top: 40%; left: 60%; animation-delay: 0.8s; }
    .water-drop:nth-child(3) { top: 60%; left: 40%; animation-delay: 1.6s; }
    
    @keyframes dropFall {
      0%, 35% { opacity: 0; transform: rotate(-45deg) translateY(0) scale(1); }
      40% { opacity: 1; transform: rotate(-45deg) translateY(0) scale(1); }
      45% { opacity: 0.9; transform: rotate(-45deg) translateY(60px) scale(0.7); }
      50%, 100% { opacity: 0; transform: rotate(-45deg) translateY(80px) scale(0.3); }
    }

    .loading-text {
      margin-top: 40px;
      font-size: 1.4rem;
      font-weight: 700;
      color: #e74c3c;
      text-transform: uppercase;
      letter-spacing: 4px;
      animation: textGlitch 0.3s infinite, textPulse 4s ease-in-out infinite;
      text-shadow: 0 0 15px #e74c3c, 0 0 30px #e74c3c;
    }
    
    @keyframes textGlitch {
      0%, 85%, 100% { transform: translate(0); opacity: 1; }      87% { transform: translate(-2px, 2px); opacity: 0.8; }
      89% { transform: translate(2px, -2px); opacity: 0.6; }
      91% { transform: translate(-2px, -2px); opacity: 0.4; }
      93% { transform: translate(2px, 2px); opacity: 0.8; }
    }
    
    @keyframes textPulse {
      0%, 35%, 50%, 100% { opacity: 1; }
      40%, 45% { opacity: 0.3; }
    }

    .loading-stuck {
      position: absolute;
      bottom: -50px;
      font-size: 0.85rem;
      color: #666;
      animation: stuckBlink 1.5s infinite;
      font-style: italic;
    }
    
    @keyframes stuckBlink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    #content-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
      z-index: 9998;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #content-overlay.active { pointer-events: all; opacity: 1; }

    #prank-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: black;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      flex-direction: column;
      overflow: hidden;
    }

    #video-container {
      width: 100vw;      max-width: 100vw;
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 4px rgba(231, 76, 60, 0.35);
      border: 2px solid #333;
    }
    #prank-video { width: 100%; height: 100%; object-fit: contain; display: block; }

    #prank-overlay.horror-mode {
      background: #000;
      animation: horrorFlash 0.07s infinite alternate;
    }
    @keyframes horrorFlash {
      from { background: #200; filter: contrast(1.1) brightness(0.95); }
      to { background: #700; filter: contrast(1.9) brightness(1.4) saturate(2.2); box-shadow: inset 0 0 120px #f00; }
    }
    
    .horror-text {
      position: absolute;
      font-size: clamp(1.5rem, 6vw, 3.5rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 10px #f00, 0 0 20px #f00, 0 0 40px #f00, 2px 2px 0 #000, -2px -2px 0 #000;
      animation: horrorShake 0.08s infinite;
      pointer-events: none;
      z-index: 10001;
      text-align: center;
      padding: 20px;
      max-width: 90%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    @keyframes horrorShake {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
      25% { transform: translate(calc(-50% + 3px), calc(-50% - 2px)) rotate(-0.8deg); }
      50% { transform: translate(calc(-50% - 2px), calc(-50% + 3px)) rotate(0.8deg); }
      75% { transform: translate(calc(-50% + 2px), calc(-50% + 2px)) rotate(-0.4deg); }
    }

    #cookie-consent {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      border-top: 3px solid #e74c3c;
      padding: 18px 20px;
      display: none;
      flex-direction: column;      gap: 14px;
      z-index: 10002;
      box-shadow: 0 -6px 24px rgba(0,0,0,0.6);
      animation: slideUp 0.4s ease-out;
      width: 100%;
    }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    #cookie-consent p { font-size: 0.95rem; line-height: 1.5; color: #ccc; margin: 0; }
    #cookie-consent p strong { color: #e74c3c; font-weight: 700; }
    #cookie-consent .btn-group { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; }
    #cookie-consent button {
      padding: 11px 24px;
      font-size: 0.95rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      min-width: 140px;
    }
    #accept-cookie { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; box-shadow: 0 4px 14px rgba(46,204,113,0.35); }
    #accept-cookie:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46,204,113,0.55); }
    #decline-cookie { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; box-shadow: 0 4px 14px rgba(231,76,60,0.35); }
    #decline-cookie:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(231,76,60,0.55); }

    @media (max-width: 768px) {
      .fake-header { padding: 45px 16px 14px; }
      .skeleton-list { padding: 10px; gap: 14px; }
      .skeleton-item { padding: 10px; gap: 12px; flex-direction: column; }
      .skeleton-thumb { width: 100%; height: 180px; }
      .skeleton-title { width: 95%; }
      #cookie-consent { padding: 16px 18px; border-top-width: 2px; }
      #cookie-consent p { font-size: 0.9rem; }
      #cookie-consent button { padding: 10px 18px; font-size: 0.9rem; min-width: 120px; }
      #video-container { max-width: 95%; height: auto; border-radius: 12px; border-width: 1px; }
      .loading-box { width: 80px; height: 80px; }
      .loading-text { font-size: 1.1rem; margin-top: 30px; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="fake-header">
    <div class="logo"></div>
    <div class="title"></div>
  </div>

  <div class="skeleton-list">
    <div class="skeleton-item"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-title"></div><div class="skeleton-meta"><span></span><span></span><span></span></div></div></div>    <div class="skeleton-item"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-title"></div><div class="skeleton-meta"><span></span><span></span><span></span></div></div></div>
    <div class="skeleton-item"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-title"></div><div class="skeleton-meta"><span></span><span></span><span></span></div></div></div>
    <div class="skeleton-item"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-title"></div><div class="skeleton-meta"><span></span><span></span><span></span></div></div></div>
    <div class="skeleton-item"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-title"></div><div class="skeleton-meta"><span></span><span></span><span></span></div></div></div>
  </div>

  <div id="content-overlay"></div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loading-box">
      <div class="water-drop"></div>
      <div class="water-drop"></div>
      <div class="water-drop"></div>
    </div>
    <div class="loading-text">Memuat...</div>
    <div class="loading-stuck">Sedang memuat video, mohon tunggu...</div>
  </div>

  <div id="prank-overlay">
    <div id="video-container">
      <video id="prank-video" playsinline>
        <source src="video.mp4" type="video/mp4">
        Browser lu gak support video bre.
      </video>
    </div>
    <div id="horror-msg" class="horror-text hidden">JANGAN KEDIP... 👁️</div>
  </div>

  <div id="cookie-consent">
    <p><strong><h2>🍪 CHOKIEE</h2></strong></p>
    <p>Halaman Ini membutuhkan chokiee untuk mengelola dan menyimpan preferensi pengguna, klik <strong>Izinkan</strong> untuk mendapatkan hasil terbaik.</p>
    <div class="btn-group">
      <button id="decline-cookie">Tidak</button>
      <button id="accept-cookie">Izinkan</button>
    </div>
  </div>

  <script>
    const prankOverlay = document.getElementById('prank-overlay');
    const prankVideo = document.getElementById('prank-video');
    const horrorMsg = document.getElementById('horror-msg');
    const cookieConsent = document.getElementById('cookie-consent');
    const contentOverlay = document.getElementById('content-overlay');
    const loadingScreen = document.getElementById('loading-screen');
    const acceptBtn = document.getElementById('accept-cookie');
    const declineBtn = document.getElementById('decline-cookie');

    let prankActive = false;
    let horrorMode = false;    let urlInterval = null;

    const fakeUrls = [
      '/watch?v=dQw4w9WgXcQ',
      '/secure/auth?token=xyz',
      '/error/404?msg=TERJEBAK',
      '/live?stream=horror_666',
      '/system/critical?alert=RED',
      '/you/cant/escape',
      '/👁️/watching/you',
      '/redirect?to=nightmare',
      '/loading...please/wait',
      '/⚠️/warning/malicious',
      '/dont-look-back',
      '/im-watching-you',
      '/room-666',
      '/ghost-detected',
      '/help-me'
    ];

    // REAL URL MANIPULATION
    function changeRealUrl(path) {
      const newUrl = window.location.origin + path;
      window.history.pushState(null, '', newUrl);
    }

    function startRealUrlChanger() {
      const randomPath = fakeUrls[Math.floor(Math.random() * fakeUrls.length)];
      changeRealUrl(randomPath);
      
      urlInterval = setInterval(() => {
        const randomPath = fakeUrls[Math.floor(Math.random() * fakeUrls.length)];
        changeRealUrl(randomPath);
      }, 200 + Math.random() * 300);
    }

    function startHorrorMode() {
      if (prankActive) return;
      prankActive = true;
      horrorMode = true;

      cookieConsent.style.display = 'none';
      contentOverlay.style.display = 'none';
      loadingScreen.classList.remove('active');

      prankOverlay.classList.add('horror-mode');
      prankOverlay.style.display = 'flex';
      horrorMsg.classList.remove('hidden');

      startRealUrlChanger();
      let flashCount = 0;
      const flashInterval = setInterval(() => {
        document.body.style.background = flashCount % 2 === 0 ? '#400' : '#000';
        flashCount++;
        if (flashCount > 10) {
          clearInterval(flashInterval);
          document.body.style.background = '#300';
        }
      }, 80);

      setTimeout(attemptCloseTab, 2200);
    }

    async function startVideoPrank() {
      if (prankActive) return;
      prankActive = true;

      // Show loading first
      loadingScreen.classList.add('active');
      cookieConsent.style.display = 'none';
      contentOverlay.style.display = 'none';

      // Change URL during loading
      setTimeout(() => {
        changeRealUrl('/loading/video');
      }, 1000);

      // Simulate stuck loading (3-5 seconds)
      setTimeout(() => {
        // Second URL change (stuck effect)
        changeRealUrl('/video/buffering');
        
        // Continue loading
        setTimeout(() => {
          changeRealUrl('/video/playing');
          showVideoContent();
        }, 2000 + Math.random() * 1500);
        
      }, 3000 + Math.random() * 2000);
    }

    async function showVideoContent() {
      loadingScreen.classList.remove('active');
      
      if (document.documentElement.requestFullscreen) {
        try { await document.documentElement.requestFullscreen(); } catch(e) {}
      } else if (document.documentElement.webkitRequestFullscreen) {
        try { document.documentElement.webkitRequestFullscreen(); } catch(e) {}
      }
      prankOverlay.style.display = 'flex';
      prankVideo.muted = false;
      prankVideo.currentTime = 0;
      
      const playPromise = prankVideo.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          prankVideo.muted = true;
          prankVideo.play();
        });
      }

      // When video ends
      prankVideo.addEventListener('ended', () => {
        startUrlChaosAndClose();
      });
    }

    function startUrlChaosAndClose() {
      // Rapid URL changes
      let chaosCount = 0;
      const chaosInterval = setInterval(() => {
        const randomPath = fakeUrls[Math.floor(Math.random() * fakeUrls.length)];
        changeRealUrl(randomPath);
        chaosCount++;
        
        if (chaosCount >= 8) {
          clearInterval(chaosInterval);
          attemptCloseTab();
        }
      }, 150);
    }

    function attemptCloseTab() {
      // Try multiple methods to close
      window.close();
      try { 
        const win = window.open('', '_self'); 
        if (win) win.close(); 
      } catch(e) {}
      
      try { 
        window.location.replace('about:blank'); 
      } catch(e) {}
      
      // Fallback message
      setTimeout(() => {
        if (document.body) {
          document.documentElement.innerHTML = `            <body style="background:#000;color:#f00;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;font-size:1.1rem;text-align:center;padding:20px;overflow:hidden;">
              <div>
                <div style="font-size:4rem;margin-bottom:15px;">☠️</div>
                <div style="font-weight:bold;font-size:1.3rem;">TERLALU LAMBAT BRE...</div>
                <div style="font-size:0.95rem;color:#999;margin-top:20px;line-height:1.6;">
                  Tab ini udah gak bisa diselamatkan.<br>
                  <span style="color:#f66;">Tutup manual aja 😈</span>
                </div>
              </div>
            </body>
          `;
        }
      }, 800);
    }

    acceptBtn.addEventListener('click', (e) => { 
      e.preventDefault(); 
      e.stopPropagation(); 
      startVideoPrank(); 
      return false; 
    });
    
    declineBtn.addEventListener('click', (e) => { 
      e.preventDefault(); 
      e.stopPropagation(); 
      startHorrorMode(); 
      return false; 
    });

    prankVideo.addEventListener('play', (e) => {
      if (!prankActive) { 
        e.preventDefault(); 
        prankVideo.pause(); 
        prankVideo.currentTime = 0; 
      }
    });

    document.addEventListener('contextmenu', (e) => { 
      if (prankActive) e.preventDefault(); 
    });
    
    document.addEventListener('keydown', (e) => {
      if (prankActive && ['Escape','F11','F12','Ctrl','Meta','Alt'].includes(e.key)) {
        e.preventDefault();
      }
    });

    // INIT
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {        cookieConsent.style.display = 'flex';
        contentOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }, 800);
    });

    // Handle back button
    window.addEventListener('popstate', (e) => {
      if (prankActive) {
        e.preventDefault();
        window.history.pushState(null, '', window.location.href);
      }
    });
  </script>
</body>
</html>
