<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Developer - Zhyllan Fyllah</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #121212;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
    }

    .header-bg {
      width: 100%;
      height: 300px;
      background: url('background.jpg') no-repeat center top;
      background-size: cover;
      position: relative;
      overflow: visible;
    }

    /* Container utama: avatar + teks berdampingan */
    .profile-section {
      position: absolute;
      left: 50px;
      top: 240px;
      display: flex;
      align-items: flex-end; /* agar teks sejajar bawah avatar */
      gap: 20px;
      z-index: 10;
    }

    .avatar-container {
      position: relative;
      z-index: 20; /* pastikan avatar selalu di atas */
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;      border: 4px solid #121212;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    /* Background teks: hanya di kanan, panjang ke kanan */
    .text-layer {
      background: rgba(0, 0, 0, 0.65);
      padding: 14px 24px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      min-width: 250px;
      max-width: 500px;
      z-index: 15; /* di bawah avatar */
    }

    .name {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .title {
      font-size: 16px;
      color: #aaa;
    }

    @media (max-width: 768px) {
      .profile-section {
        left: 20px;
        top: 200px;
        gap: 15px;
      }
      .avatar {
        width: 120px;
        height: 120px;
      }
      .text-layer {
        padding: 12px 20px;
        min-width: 200px;
      }
      .name {
        font-size: 22px;
      }
      .title {
        font-size: 14px;
      }
    }
  </style></head>
<body>
  <div class="header-bg">
    <div class="profile-section">
      <div class="avatar-container">
        <img src="profile.jpg" alt="Zhyllan Fyllah" class="avatar">
      </div>
      <div class="text-layer">
        <div class="name">Zhyllan Fyllah</div>
        <div class="title"><a href="https://www.github.com/jirankun/">@Jirankun</a></div>
      </div>
    </div>
  </div>
</body>
</html>
